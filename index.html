<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MyCards — ETB First Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            colors: {
              brand: { DEFAULT: "#1d39c4", hover: "#172ea3", link: "#1d39c4" },
            },
            boxShadow: {
              sheet: "0 -8px 24px rgba(0, 0, 0, 0.08)",
            },
            spacing: {
              /* Figma ETB First Time: sheet starts ~552/1024 of asset → 431px @ 800px frame */
              hero: "431px",
              sheet: "369px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh;
        /* Page chrome outside the phone frame */
        background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      }
      /* Mobile frame — top hero gradient */
      .etb-top-gradient {
        background: linear-gradient(180deg, #080326 0%, #0e346b 55%);
      }
      /* Exact frame: 360×800 (Figma “ETB - First Time”) */
      .frame-root {
        width: 360px;
        height: 800px;
        /* Gradient should fill the whole mobile frame */
        background: linear-gradient(180deg, #080326 0%, #0E346B 55%);
      }
      .btn-loading svg {
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-start justify-center p-0 sm:py-6">
    <!--
      PAGE LAYERS (bottom → top, per region)

      [Viewport — body]
        L0  Page chrome gradient (CSS on body; outside phone frame)

      [Mobile frame — .frame-root, 360×800, flex column]
        L1  Hero block (.h-hero, 431px) — stacking context
              L0  Full-hero fill: .etb-top-gradient (background on hero div)
              L1  Screenshot: img.etb-first-time (z-10, absolute)
              L2  Hit targets: #btn-eva, #btn-menu (z-20, absolute)
        L2  Bottom sheet (flex-1, relative z-10, -mt-px over hero seam)
              • Drag handle, title, input, helper, #input-hint
              • #btn-otp + spinner
              • Footer copy + nav links
              • Home indicator bar
        (siblings: sheet paints above hero where they overlap)

      [Global overlay]
        L99 Toast #toast (fixed, z-50; hidden via opacity until script shows it)
    -->
    <div class="frame-root relative mx-auto overflow-hidden rounded-none sm:shadow-2xl flex flex-col">
      <!-- Hero: ETB gradient fill + reference art (PNG) -->
      <div class="relative w-[360px] h-hero shrink-0 overflow-hidden etb-top-gradient">
        <img
          src="assets/etb-first-time.png"
          width="360"
          height="800"
          alt=""
          class="absolute left-0 top-0 z-10 h-[800px] w-[360px] max-w-none select-none pointer-events-none object-fill"
          draggable="false"
        />
        <!-- Transparent hit areas (positions match layout in reference) -->
        <button
          type="button"
          id="btn-eva"
          class="absolute z-20 top-[38px] right-[86px] h-8 min-w-[4.5rem] rounded-full bg-transparent active:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/70"
          aria-label="Ask EVA"
        ></button>
        <button
          type="button"
          id="btn-menu"
          class="absolute z-20 top-[34px] right-[10px] h-10 w-10 rounded-full bg-transparent active:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/70"
          aria-label="Open menu"
        ></button>
      </div>

      <!-- Bottom sheet: interactive layer (matches Figma spacing; graphics above are unchanged) -->
      <div
        class="flex flex-col flex-1 min-h-0 bg-white rounded-t-[24px] -mt-px shadow-sheet relative z-10 overflow-hidden px-6 pt-3 pb-0"
      >
        <!-- Login Details top border (5px gradient) -->
        <div
          aria-hidden="true"
          class="absolute left-0 right-0 top-0 h-[5px] bg-[linear-gradient(90deg,#FFB6BA_0%,#3D62F3_50%,#FFB1B6_100%)] z-[1]"
        ></div>
        <div class="relative z-10">
          <div class="flex justify-center pb-[32px]" aria-hidden="true">
            <span class="h-1 w-9 rounded-full bg-neutral-200"></span>
          </div>

          <h2 class="text-[17px] font-bold text-neutral-900 leading-tight mb-4">Let’s Get Started</h2>

          <label class="block">
            <span class="sr-only">Mobile Number</span>
            <input
              id="mobile"
              type="tel"
              inputmode="numeric"
              maxlength="10"
              autocomplete="tel-national"
              placeholder="Mobile Number"
              class="w-full rounded-lg border border-neutral-200 bg-white px-3.5 py-3 text-[15px] text-neutral-900 placeholder:text-neutral-400 outline-none transition-shadow focus:border-brand focus:ring-2 focus:ring-brand/20"
            />
          </label>
        <p id="info-text" class="mt-2 text-[12px] text-neutral-500 leading-snug">
          You’ll receive an OTP on this number
        </p>
        <p id="input-hint" class="mt-1 text-xs min-h-[1rem] text-red-600 hidden"></p>

          <button
            type="button"
            id="btn-otp"
            class="mt-5 w-full rounded-xl bg-brand py-3.5 text-[14px] font-bold text-white tracking-wide shadow-sm transition-colors hover:bg-brand-hover active:bg-brand-hover focus:outline-none focus-visible:ring-2 focus-visible:ring-brand focus-visible:ring-offset-2 disabled:opacity-60 disabled:pointer-events-none flex items-center justify-center gap-2"
          >
            <span id="otp-label">Get OTP</span>
            <span id="otp-spinner" class="hidden btn-loading">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25" />
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round" />
              </svg>
            </span>
          </button>

          <div class="mt-auto flex flex-col items-center pt-6 pb-2">
            <p class="text-[10px] text-neutral-400 text-center">© Copyright 2023 HDFC Bank Ltd.</p>
            <nav
              class="mt-2.5 flex flex-wrap items-center justify-center gap-x-3 gap-y-1 text-[10px] font-semibold text-brand-link px-1"
            >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Cookie Policy</a
              >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Terms &amp; Conditions</a
              >
              <a href="#" class="hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-brand rounded px-0.5"
                >Privacy Policy</a
              >
            </nav>
          </div>

          <!-- Home indicator (system bar) -->
          <div class="flex justify-center pb-2 pt-1" aria-hidden="true">
            <span class="h-[5px] w-[108px] rounded-full bg-neutral-300/90"></span>
          </div>
        </div>

      <!-- OTP bottom-sheet (appears from bottom on CTA) -->
      <div
        id="otp-backdrop"
        class="absolute inset-0 bg-black/20 opacity-0 pointer-events-none transition-opacity duration-200 z-[45]"
        aria-hidden="true"
      ></div>
      <div
        id="otp-sheet"
        class="absolute left-0 bottom-0 w-[360px] h-[347px] bg-[#fdfeff] rounded-t-[26px] overflow-hidden translate-y-full opacity-0 pointer-events-none transition-transform duration-300 ease-out transition-opacity z-[50]"
        role="dialog"
        aria-modal="true"
        aria-label="Enter OTP"
      >
        <!-- OTP top gradient edge (approx. Figma top design) -->
        <div
          aria-hidden="true"
          class="absolute left-0 right-0 top-0 h-[5px] bg-[linear-gradient(90deg,#FFB6BA_0%,#3D62F3_50%,#FFB1B6_100%)]"
        ></div>
        <!-- Small handle at top -->
        <div class="absolute left-1/2 top-[16px] -translate-x-1/2 z-[2]">
          <span class="block h-[6px] w-[40px] rounded-full bg-neutral-300"></span>
        </div>

        <div class="pt-[40px] px-[32px] h-full flex flex-col items-center gap-[24px] relative">
          <div class="w-[312px] text-center">
            <p class="font-semibold text-[#222] text-[18px] leading-[1.4]">Enter OTP</p>
            <p class="mt-[12px] text-[#444] font-normal text-[14px] leading-[1.4]">
              An OTP has been sent on
              <span class="text-[#222]">••••••</span>
              <span id="otp-last4" class="text-[#222]">3210</span>
            </p>
          </div>

          <div
            id="otp-code-field"
            class="relative w-[320px] h-[48px] bg-white border border-[#9ca3af] rounded-[8px] flex items-center justify-center overflow-hidden"
          >
            <!-- Dots (visual) -->
            <div class="w-full px-[16px] flex items-center justify-between">
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
              <span class="otp-dot w-[14px] h-[14px] rounded-full bg-[#0b1220]"></span>
            </div>

            <!-- Real input (tap to focus; digits captured in JS) -->
            <input
              id="otp-raw"
              inputmode="numeric"
              autocomplete="one-time-code"
              pattern="[0-9]*"
              maxlength="6"
              class="absolute inset-0 opacity-0"
              aria-label="OTP code"
            />
          </div>

          <div class="w-full flex items-center justify-between text-[16px]">
            <a
              href="#"
              id="otp-resend"
              class="text-[#1c3fca] font-medium hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-[#1c3fca] rounded"
            >
              Resend OTP
            </a>
            <span id="otp-didnt" class="text-[#505c65] font-normal">Didn’t receive?</span>
          </div>

          <button
            type="button"
            id="otp-verify"
            class="w-full bg-[#1c3fca] text-white rounded-[11px] py-[12px] text-[16px] font-semibold shadow-sm"
          >
            Verify OTP
          </button>

          <div class="flex-1"></div>
        </div>

      </div>
    </div>

    <div
      id="toast"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 max-w-[90vw] px-4 py-2.5 rounded-lg bg-neutral-900 text-white text-sm shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50"
      role="status"
    ></div>

    <script>
      (function () {
        var infoText = document.getElementById("info-text");
        var otpSheet = document.getElementById("otp-sheet");
        var otpBackdrop = document.getElementById("otp-backdrop");
        var otpLast4 = document.getElementById("otp-last4");
        var otpRaw = document.getElementById("otp-raw");
        var otpVerifyBtn = document.getElementById("otp-verify");
        var otpResend = document.getElementById("otp-resend");
        function showToast(msg) {
          var t = document.getElementById("toast");
          t.textContent = msg;
          t.classList.remove("opacity-0");
          clearTimeout(showToast._h);
          showToast._h = setTimeout(function () {
            t.classList.add("opacity-0");
          }, 2200);
        }

        document.getElementById("btn-eva").addEventListener("click", function () {
          showToast("Ask EVA");
        });
        document.getElementById("btn-menu").addEventListener("click", function () {
          showToast("Menu");
        });

        var mobile = document.getElementById("mobile");
        var hint = document.getElementById("input-hint");
        var btnOtp = document.getElementById("btn-otp");
        var otpLabel = document.getElementById("otp-label");
        var otpSpinner = document.getElementById("otp-spinner");

        var defaultInfoText = "You’ll receive an OTP on this number";

        function setInfoText(text, isError) {
          infoText.textContent = text;
          if (isError) {
            infoText.classList.remove("text-neutral-500");
            infoText.classList.add("text-red-600");
          } else {
            infoText.classList.remove("text-red-600");
            infoText.classList.add("text-neutral-500");
          }
        }

        mobile.addEventListener("input", function () {
          this.value = this.value.replace(/\D/g, "").slice(0, 10);
          hint.classList.add("hidden");
          setInfoText(defaultInfoText, false);
        });

        function openOtp(last4) {
          otpLast4.textContent = last4;
          otpRaw.value = "";
          otpRaw.dispatchEvent(new Event("input"));

          otpSheet.classList.remove("translate-y-full", "opacity-0", "pointer-events-none");
          otpSheet.classList.add("translate-y-0", "opacity-100", "pointer-events-auto");
          otpBackdrop.classList.remove("opacity-0", "pointer-events-none");
          otpBackdrop.classList.add("opacity-100", "pointer-events-auto");

          setTimeout(function () {
            otpRaw.focus();
          }, 100);
        }

        function closeOtp() {
          otpSheet.classList.add("translate-y-full", "opacity-0", "pointer-events-none");
          otpSheet.classList.remove("translate-y-0", "opacity-100", "pointer-events-auto");
          otpBackdrop.classList.add("opacity-0", "pointer-events-none");
          otpBackdrop.classList.remove("opacity-100", "pointer-events-auto");
        }

        otpBackdrop.addEventListener("click", function () {
          closeOtp();
        });

        otpResend.addEventListener("click", function (e) {
          e.preventDefault();
          showToast("Resent OTP");
          // Keep popup open; real OTP call can be wired later.
        });

        otpVerifyBtn.addEventListener("click", function () {
          showToast("OTP verified");
          closeOtp();
          window.location.href = "verify.html";
        });

        btnOtp.addEventListener("click", function () {
          var v = mobile.value.trim();
          if (!/^\d{10}$/.test(v)) {
            hint.classList.add("hidden");
            setInfoText("Enter valid Mobile number", true);
            mobile.focus();
            return;
          }

          setInfoText(defaultInfoText, false);
          btnOtp.disabled = true;
          otpLabel.textContent = "Sending…";
          otpSpinner.classList.remove("hidden");
          setTimeout(function () {
            otpSpinner.classList.add("hidden");
            otpLabel.textContent = "Get OTP";
            btnOtp.disabled = false;

            // Open OTP overlay from bottom of the same page
            openOtp(v.slice(-4));
          }, 1500);
        });
      })();
    </script>
  </body>
</html>
